<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nestcast Project</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* MEDIA SECTIONS */
.section {
  padding: 100px 60px;
}

.full-media video,
.full-media img {
  width: 100%;
  max-height: 80vh;
  border-radius: 20px;
  object-fit: contain;
  box-shadow: 0 20px 50px rgba(255, 255, 255, 0.15);
}

/* GRID */
.custom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.custom-grid img, .custom-grid video {
  width: 100%;
  max-height: 80vh;
  border-radius: 20px;
  object-fit: contain;
  box-shadow: 0 20px 50px rgba(255, 255, 255, 0.15);
}

/* TEXT */
.text-section {
  max-width: 800px;
  margin: auto;
  text-align: center;
}

.text-section h2 {
  font-size: 50px;
  margin-bottom: 20px;
}

.text-section p {
  opacity: 0.7;
  line-height: 1.6;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 80px 20px;
  opacity: 0.6;
}

/* Sound Toggle Button */
.sound-toggle {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 10;
  background-color: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  padding: 12px 20px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sound-toggle:hover {
  background-color: rgba(255, 255, 255, 0.2);
}

/* Responsive */
@media (max-width: 768px) {
  .section {
    padding: 60px 30px;
  }
  .custom-grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .text-section h2 {
    font-size: 32px;
  }
  .text-section p {
    font-size: 14px;
  }
}

@media (max-width: 480px) {
  .section {
    padding: 40px 16px;
  }
  .full-media img, .full-media video,
  .custom-grid img, .custom-grid video {
    border-radius: 12px;
  }
  .text-section h2 {
    font-size: 26px;
  }
  .text-section p {
    font-size: 13px;
    line-height: 1.5;
  }
  .footer {
    padding: 60px 16px;
    font-size: 13px;
  }
  .sound-toggle {
    bottom: 15px;
    right: 15px;
    padding: 10px 16px;
    font-size: 14px;
  }
}
</style>
</head>

<body>



<div class="container-fluid p-0">

  <!-- IMAGE 1 -->
  <section class="section full-media">
    <img src="assets/Nest%20instant/1.jpg.jpeg" alt="Nestcast 1">
  </section>

  <!-- VIDEO 1 -->
  <section class="section full-media">
    <div class="video-container" style="position: relative; display: inline-block; width: 100%;">
      <video class="project-video" autoplay loop muted playsinline>
        <source src="assets/Nest%20instant/19.mp4" type="video/mp4">
      </video>
      <button class="sound-toggle">
        <svg class="sound-icon-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
        <svg class="sound-icon-on" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        <span class="sound-text">Sound Off</span>
      </button>
    </div>
  </section>

  <!-- IMAGE GRID -->
  <section class="section custom-grid">
    <img src="assets/Nest%20instant/2.jpg.jpeg" alt="Nestcast 2">
    <img src="assets/Nest%20instant/3.jpg.jpeg" alt="Nestcast 3">
  </section>

  <!-- IMAGE 4 -->
  <section class="section full-media">
    <img src="assets/Nest%20instant/4.jpg.jpeg" alt="Nestcast 4">
  </section>

  <!-- IMAGE GRID 2 -->
  <section class="section custom-grid">
    <img src="assets/Nest%20instant/5.jpg.jpeg" alt="Nestcast 5">
    <img src="assets/Nest%20instant/6.jpg.jpeg" alt="Nestcast 6">
  </section>

  <!-- VIDEO 2 -->
  <section class="section full-media">
    <div class="video-container" style="position: relative; display: inline-block; width: 100%;">
      <video class="project-video" autoplay loop muted playsinline>
        <source src="assets/Nest%20instant/22.mp4" type="video/mp4">
      </video>
      <button class="sound-toggle">
        <svg class="sound-icon-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
        <svg class="sound-icon-on" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        <span class="sound-text">Sound Off</span>
      </button>
    </div>
  </section>

  <!-- TEXT -->
  <section class="section text-section">
    <h2>Nestcast Innovation</h2>
    <p>
      Showcasing a modern and interactive presentation, Nestcast pushes the boundaries of digital experience.
      A perfect blend of seamless motion, intuitive structure, and premium quality visuals that define our capabilities.
    </p>
  </section>

  <!-- FINAL IMAGE -->
  <section class="section full-media">
    <img src="assets/Nest%20instant/7.jpg.jpeg" alt="Nestcast 7">
  </section>

</div>

<!-- FOOTER -->
<div class="footer">
  Info@esdesignlab.com
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const videoContainers = document.querySelectorAll('.video-container');
    
    videoContainers.forEach(container => {
      const video = container.querySelector('.project-video');
      const soundToggle = container.querySelector('.sound-toggle');
      const soundText = container.querySelector('.sound-text');
      const iconOff = container.querySelector('.sound-icon-off');
      const iconOn = container.querySelector('.sound-icon-on');
      
      let isMuted = true; // default muted

      soundToggle.addEventListener('click', function() {
        isMuted = !isMuted;
        video.muted = isMuted;
        
        if (isMuted) {
          soundText.textContent = 'Sound Off';
          iconOff.style.display = 'block';
          iconOn.style.display = 'none';
        } else {
          soundText.textContent = 'Sound On';
          iconOff.style.display = 'none';
          iconOn.style.display = 'block';
        }
      });
    });
  });
</script>

</body>
</html>
