<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rojin Philip Project</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}


/* IMAGE SECTIONS */
.section {
  padding: 100px 60px;
}

.full-img img {
  width: 100%;
  border-radius: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.grid img {
  width: 100%;
  border-radius: 20px;
}

/* TEXT */
.text-section {
  max-width: 800px;
  margin: auto;
  text-align: center;
}

.text-section h2 {
  font-size: 50px;
  margin-bottom: 20px;
}

.text-section p {
  opacity: 0.7;
  line-height: 1.6;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 80px 20px;
  opacity: 0.6;
}
</style>
</head>

<body>


<!-- IMAGE 1 -->
<section class="section full-img">
  <img src="assets/1.jpg">
</section>

<!-- IMAGE GRID -->
<section class="section grid">
  <img src="assets/2.jpg">
  <img src="assets/3.jpg">
</section>

<!-- IMAGE -->
<section class="section full-img">
  <img src="assets/4.jpg">
</section>

<!-- IMAGE GRID -->
<section class="section grid">
  <img src="assets/5.jpg">
  <img src="assets/6.jpg">
</section>

<!-- TEXT -->
<section class="section text-section">
  <h2>Luxury Branding Experience</h2>
  <p>
    This project represents a premium identity system designed with precision,
    elegance, and timeless aesthetics. Every element reflects a refined brand
    philosophy built for high-end positioning.
  </p>
</section>

<!-- FINAL IMAGE -->
<section class="section full-img">
  <img src="assets/7.jpg">
</section>

<!-- FOOTER -->
<div class="footer">
  Info@esdesignlab.com
</div>

<style>
/* Responsive */
@media (max-width: 768px) {
  .section {
    padding: 60px 30px;
  }
  .grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .text-section h2 {
    font-size: 32px;
  }
  .text-section p {
    font-size: 14px;
  }
}

@media (max-width: 480px) {
  .section {
    padding: 40px 16px;
  }
  .full-img img {
    border-radius: 12px;
  }
  .grid img {
    border-radius: 12px;
  }
  .text-section h2 {
    font-size: 26px;
  }
  .text-section p {
    font-size: 13px;
    line-height: 1.5;
  }
  .footer {
    padding: 60px 16px;
    font-size: 13px;
  }
}
</style>

</body>
</html>
