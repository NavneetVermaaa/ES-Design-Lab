<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign & Print Project</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* MEDIA SECTIONS */
.section {
  padding: 100px 60px;
}

.full-media img {
  width: 100%;
  max-height: 80vh;
  border-radius: 20px;
  object-fit: contain;
  box-shadow: 0 20px 50px rgba(255, 255, 255, 0.15);
}

/* GRID */
.custom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.custom-grid img {
  width: 100%;
  max-height: 80vh;
  border-radius: 20px;
  object-fit: contain;
  box-shadow: 0 20px 50px rgba(255, 255, 255, 0.15);
}

/* TEXT */
.text-section {
  max-width: 800px;
  margin: auto;
  text-align: center;
}

.text-section h2 {
  font-size: 50px;
  margin-bottom: 20px;
}

.text-section p {
  opacity: 0.7;
  line-height: 1.6;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 80px 20px;
  opacity: 0.6;
}

/* Responsive */
@media (max-width: 768px) {
  .section {
    padding: 60px 30px;
  }
  .custom-grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .text-section h2 {
    font-size: 32px;
  }
  .text-section p {
    font-size: 14px;
  }
}

@media (max-width: 480px) {
  .section {
    padding: 40px 16px;
  }
  .full-media img,
  .custom-grid img {
    border-radius: 12px;
  }
  .text-section h2 {
    font-size: 26px;
  }
  .text-section p {
    font-size: 13px;
    line-height: 1.5;
  }
  .footer {
    padding: 60px 16px;
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="container-fluid p-0">

  <!-- IMAGE 1 -->
  <section class="section full-media">
    <img src="assets/signNprint/Logo%202_1.jpg.jpeg" alt="Sign & Print 1">
  </section>

  <!-- IMAGE GRID -->
  <section class="section custom-grid">
    <img src="assets/signNprint/Logo%202_2.jpg.jpeg" alt="Sign & Print 2">
    <img src="assets/signNprint/Logo%202_3.jpg.jpeg" alt="Sign & Print 3">
  </section>

  <!-- IMAGE 4 -->
  <section class="section full-media">
    <img src="assets/signNprint/Logo%202_4.jpg.jpeg" alt="Sign & Print 4">
  </section>

  <!-- TEXT -->
  <section class="section text-section">
    <h2>Sign & Print Identity</h2>
    <p>
      A bold and expressive brand identity designed to capture attention and communicate quality.
      The visual language is structured yet dynamic, emphasizing modern printing excellence.
    </p>
  </section>

  <!-- FINAL IMAGE -->
  <section class="section full-media">
    <img src="assets/signNprint/Logo%202_6.jpg.jpeg" alt="Sign & Print Final">
  </section>

</div>

<!-- FOOTER -->
<div class="footer">
  Info@esdesignlab.com
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
